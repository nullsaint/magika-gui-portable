name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.1.0

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            output_name: magika-gui-windows.exe
            pyinstaller_args: "--onefile --windowed"
          - os: ubuntu-latest
            output_name: magika-gui-linux
            pyinstaller_args: "--onefile"
          - os: macos-latest
            output_name: magika-gui-macos
            pyinstaller_args: "--onefile --windowed"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install magika customtkinter matplotlib pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          # Dynamically find library paths and normalize backslashes for bash
          MAGIKA_PATH=$(python -c "import magika, os; print(os.path.dirname(magika.__file__).replace('\\\\', '/'))")
          CTK_PATH=$(python -c "import customtkinter, os; print(os.path.dirname(customtkinter.__file__).replace('\\\\', '/'))")
          
          # Handle Windows vs Posix path separators in --add-data
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            SEP=";"
          else
            SEP=":"
          fi

          pyinstaller --noconfirm ${{ matrix.pyinstaller_args }} --name magika-gui-portable \
            --add-data "${MAGIKA_PATH}/models${SEP}magika/models" \
            --add-data "${MAGIKA_PATH}/config${SEP}magika/config" \
            --add-data "${CTK_PATH}${SEP}customtkinter" \
            main.py

      - name: Rename Output
        shell: bash
        run: |
          cd dist
          if [[ -f "magika-gui-portable.exe" ]]; then
            mv magika-gui-portable.exe ../${{ matrix.output_name }}
          elif [[ -f "magika-gui-portable" ]]; then
            mv magika-gui-portable ../${{ matrix.output_name }}
          elif [[ -d "magika-gui-portable.app" ]]; then
            zip -r ../${{ matrix.output_name }}.zip magika-gui-portable.app
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: ${{ matrix.output_name }}*

  # SPECIAL JOB: Create the .deb package for the Magika team
  package-deb:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: magika-gui-linux
          path: .

      - name: Create DEB Structure
        run: |
          mkdir -p magika-gui-deb/usr/bin
          mkdir -p magika-gui-deb/DEBIAN
          cp magika-gui-linux magika-gui-deb/usr/bin/magika-gui
          chmod +x magika-gui-deb/usr/bin/magika-gui
          
          cat <<EOF > magika-gui-deb/DEBIAN/control
          Package: magika-gui
          Version: 1.1.4
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: nullsaint
          Description: AI-powered file identification GUI (Magika wrapper)
           A professional GUI for Google's Magika deep learning engine.
          EOF

      - name: Build DEB
        run: dpkg-deb --build magika-gui-deb magika-gui.deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: magika-gui-deb
          path: magika-gui.deb

  release:
    needs: [build, package-deb]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/magika-gui-windows.exe/magika-gui-windows.exe
            artifacts/magika-gui-linux/magika-gui-linux
            artifacts/magika-gui-macos/magika-gui-macos.zip
            artifacts/magika-gui-deb/magika-gui.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
